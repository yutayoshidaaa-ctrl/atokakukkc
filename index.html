<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>じもとつながるプラン / みらいプラン KKCアプリ</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --card: #ffffff;
      --line: #d8deea;
      --text: #1f2937;
      --sub: #6b7280;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --warn: #b91c1c;
      --ok: #166534;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic UI", "Yu Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }
    .wrap {
      max-width: 1560px;
      margin: 0 auto;
      padding: 20px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 28px;
    }
    .lead {
      margin: 0 0 14px;
      color: var(--sub);
      line-height: 1.7;
    }
    .plan-switch {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .tab-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .tab-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .grid {
      display: grid;
      grid-template-columns: 390px 1fr;
      gap: 18px;
      align-items: stretch;
      min-height: 0;
      flex: 1;
    }
    .panel, .script-area {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.05);
      min-height: 0;
    }
    .panel {
      padding: 18px;
      overflow-y: auto;
    }
    .script-area {
      padding: 18px;
      overflow-y: auto;
    }
    .group {
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid #eef2f7;
    }
    .group:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .group h2 {
      font-size: 16px;
      margin: 0 0 10px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin: 10px 0 6px;
    }
    select, input[type="text"], input[type="number"], textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
    }
    textarea { min-height: 100px; resize: vertical; }
    .inline-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .inline-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }
    .check {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 8px 0;
      font-size: 14px;
    }
    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }
    button {
      border: none;
      background: var(--accent);
      color: #fff;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    button.secondary { background: #475569; }
    button.light { background: #e5e7eb; color: #111827; }
    .section {
      margin-bottom: 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      background: #fff;
    }
    .section-header {
      padding: 12px 14px;
      background: #f8fafc;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .section-header h3 {
      margin: 0;
      font-size: 16px;
    }
    .section-body {
      padding: 14px;
      white-space: pre-wrap;
      line-height: 1.9;
      font-size: 15px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 700;
      padding: 5px 8px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
    }
    .topbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    @media (max-width: 1100px) {
      body { height: auto; overflow: auto; }
      .wrap { height: auto; overflow: visible; }
      .grid { grid-template-columns: 1fr; flex: none; }
      .panel, .script-area { overflow: visible; min-height: auto; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>地域創生ホールディングス KKCアプリ</h1>
    <p class="lead">じもとつながるプランとみらいプランを切り替えて使える構成です。必須トークは常時表示し、分岐トークは入力内容に応じて表示します。</p>

    <div class="plan-switch">
      <button class="tab-btn active" id="tab-jimoto" onclick="switchPlan('jimoto')">じもとつながるプラン</button>
      <button class="tab-btn" id="tab-mirai" onclick="switchPlan('mirai')">みらいプラン</button>
    </div>

    <div class="grid">
      <aside class="panel">
        <div class="group">
          <h2>基本情報</h2>
          <label>担当者名</label>
          <input id="agentName" type="text" placeholder="例：吉田" />

          <label>お客様名</label>
          <input id="customerName" type="text" placeholder="例：山田様" />

          <label>プラン名</label>
          <input id="planName" type="text" placeholder="例：じもとつながるプラン / みらいプラン" />

          <label>住所（再点用）</label>
          <input id="addressText" type="text" placeholder="例：福岡県福岡市〜" />

          <div class="inline-2">
            <div>
              <label>供給開始月</label>
              <input id="startMonth" type="text" placeholder="例：4月" />
            </div>
            <div>
              <label>供給開始日</label>
              <input id="startDay" type="text" placeholder="例：15日" />
            </div>
          </div>

          <label>折り返し番号下4桁</label>
          <input id="phoneLast4" type="text" placeholder="例：1234" />
        </div>

        <div class="group">
          <h2>対応種別</h2>
          <label>通話パターン</label>
          <select id="callType">
            <option value="opening">架電（通常）</option>
            <option value="inbound">受電</option>
            <option value="voicemail">留守電</option>
          </select>

          <label>案件区分</label>
          <select id="caseType">
            <option value="normal">通常</option>
            <option value="respot">再点案件（顧客区分：ご入居）</option>
          </select>

          <label>営業形態</label>
          <select id="salesType">
            <option value="normal">通常</option>
            <option value="telema">テレマ案件</option>
            <option value="tiktok_ts">TS / TUIKOT</option>
            <option value="hp">HP / 訪問</option>
          </select>

          <label>契約書・重要事項説明書の確認パターン</label>
          <select id="docType">
            <option value="sms">ショートメール / SMS</option>
            <option value="paperless">訪問ペーパレス（HF）</option>
            <option value="other">HP（訪問）など上記以外</option>
          </select>
        </div>

        <div class="group" id="jimoto-controls">
          <h2>じもとつながる分岐</h2>
          <label>切替種別</label>
          <select id="jimotoSwitchType">
            <option value="sw">SW（切替）</option>
            <option value="respot_start">再点（供給開始確認）</option>
          </select>

          <label>要点確認プラン型</label>
          <select id="jimotoPriceType">
            <option value="market">市場連動</option>
            <option value="flat">フラット（平準化）</option>
          </select>
        </div>

        <div class="group" id="mirai-controls" style="display:none;">
          <h2>みらい分岐</h2>
          <label>みらい追加説明書の確認種別</label>
          <select id="miraiGuideType">
            <option value="hp">HP / 訪問</option>
            <option value="ts">TS / TUIKOT</option>
          </select>

          <label>オプション表示名</label>
          <input id="miraiOptionNames" type="text" placeholder="例：ウェルカム割、設備メンテナンスオプション" />

          <label class="check"><input id="miraiWelcome" type="checkbox" /> ウェルカム割あり</label>
          <label class="check"><input id="miraiMaintenance" type="checkbox" /> 設備メンテナンスオプションあり</label>
          <label class="check"><input id="miraiClaris" type="checkbox" /> クラリスあり</label>
          <label class="check"><input id="miraiRescue" type="checkbox" /> トラブル解決レスキューあり</label>
          <label class="check"><input id="miraiOfficePack" type="checkbox" /> オフィス/店舗サポートパックあり</label>
          <label class="check"><input id="miraiSubsidyPack" type="checkbox" /> オフィス/店舗補助金サポートパックあり</label>
          <label class="check"><input id="miraiFoodPack" type="checkbox" /> 飲食店サポートパックあり</label>
          <label class="check"><input id="miraiRelativeDiscount" type="checkbox" /> 相対割引あり</label>
        </div>

        <div class="group">
          <h2>契約・請求</h2>
          <label>契約数・内容</label>
          <select id="contractPattern">
            <option value="jyuryo_only">従量のみ</option>
            <option value="jyuryo_doryoku">従量＋低圧(動力)</option>
            <option value="jyuryo_doryoku_gas">従量＋低圧(動力)＋ガス</option>
            <option value="doryoku_only">動力のみ</option>
          </select>

          <div class="inline-2">
            <div>
              <label>契約数表示</label>
              <input id="contractCount" type="text" placeholder="例：3" />
            </div>
            <div>
              <label>契約年数</label>
              <input id="contractYears" type="text" placeholder="例：5" value="5" />
            </div>
          </div>

          <label class="check"><input id="gasIncluded" type="checkbox" /> ガス付帯あり</label>
          <label class="check"><input id="gasSetDiscount" type="checkbox" /> ガスのセット割あり</label>
          <label class="check"><input id="otokugas" type="checkbox" /> おトクガス</label>
          <label class="check"><input id="ownerUnknown" type="checkbox" /> 店舗数・オーナー了承が空白 / 不明</label>

          <label>支払方法</label>
          <select id="paymentType">
            <option value="credit">クレジットカード</option>
            <option value="bank">口座</option>
            <option value="convenience">コンビニ</option>
          </select>

          <label>地域（ガストーク用）</label>
          <select id="regionType">
            <option value="tokyo">東京</option>
            <option value="osaka">大阪</option>
            <option value="nagoya">名古屋</option>
            <option value="other">その他</option>
          </select>
        </div>

        <div class="group">
          <h2>NG対応</h2>
          <label>キャンセル対応</label>
          <select id="ngType">
            <option value="none">表示しない</option>
            <option value="elderly">高齢者</option>
            <option value="non_elderly">高齢者以外</option>
            <option value="respot_long_absence">再点案件：長期留守NG</option>
            <option value="cancel_common">キャンセル希望（共通）</option>
          </select>
        </div>

        <div class="btn-row">
          <button onclick="renderScript()">反映する</button>
          <button class="secondary" onclick="copyAllText()">全文コピー</button>
          <button class="light" onclick="resetForm()">初期化</button>
        </div>
      </aside>

      <main class="script-area">
        <div class="topbar">
          <div class="badge" id="currentPlanBadge">じもとつながるプラン</div>
          <div class="badge">必須トーク常時表示</div>
          <div class="badge">左右独立スクロール</div>
        </div>
        <div id="sections"></div>
        <section class="section">
          <div class="section-header">
            <h3>メモ欄</h3>
            <span class="badge">自由入力</span>
          </div>
          <div class="section-body">
            <textarea placeholder="備考・実際の運用メモ・クライアント指示など"></textarea>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script>
    let currentPlan = 'jimoto';

    const feePlans = [
      '〇〇でんきシンプルプランM/F',
      '〇〇でんきビジネスプランM/F',
      '〇〇でんきパックプランQ,20',
      '〇〇でんき動力プランM/F'
    ];

    function v(id) {
      const el = document.getElementById(id);
      return el ? el.value.trim() : '';
    }
    function checked(id) {
      const el = document.getElementById(id);
      return el ? el.checked : false;
    }
    function textOr(value, fallback) { return value ? value : fallback; }
    function isSkipCheckSalesType() {
      const s = v('salesType');
      return s === 'telema' || s === 'tiktok_ts';
    }
    function hasOfficeFee() {
      const name = v('planName');
      return feePlans.some(p => name.includes(p.replaceAll('〇〇', '')) || name.includes(p));
    }
    function makeSection(title, body, tag = '必須') {
      return `
        <section class="section">
          <div class="section-header">
            <h3>${title}</h3>
            <span class="badge">${tag}</span>
          </div>
          <div class="section-body">${body}</div>
        </section>
      `;
    }

    function switchPlan(plan) {
      currentPlan = plan;
      document.getElementById('tab-jimoto').classList.toggle('active', plan === 'jimoto');
      document.getElementById('tab-mirai').classList.toggle('active', plan === 'mirai');
      document.getElementById('jimoto-controls').style.display = plan === 'jimoto' ? 'block' : 'none';
      document.getElementById('mirai-controls').style.display = plan === 'mirai' ? 'block' : 'none';
      document.getElementById('currentPlanBadge').textContent = plan === 'jimoto' ? 'じもとつながるプラン' : 'みらいプラン';
      renderScript();
    }

    function commonOpening() {
      const agent = textOr(v('agentName'), '○○');
      const customer = textOr(v('customerName'), '○○様');
      const type = v('callType');

      if (currentPlan === 'jimoto') {
        if (type === 'inbound') {
          return `お電話ありがとうございます。わたくし、株式会社地域創生ホールディングスの${agent}と申します。
お客様情報の確認をいたしますので、お客様の電話番号をお願いいたします。内容確認をいたしますので、少々お待ちくださいませ。確認が取れましたので、続きましては、屋号名とご代表者様のお名前をよろしくお願いいたします。
続きまして、ご契約者様の生年月日を西暦でお伺いしてもよろしいでしょうか。（有難う御座います！）
確認が取れました。ご協力ありがとうございました。

ご代表者様以外の場合→申込番号や、屋号名、お名前を伺い、ご代表様に代わって頂く。→＜オープニングトーク/パーミッション＞に戻る。

営業マンの場合（最後）→注意事項などないでしょうか。`;
        }
        if (type === 'voicemail') {
          return `わたくし、先日「じもとつながるプラン」のお申込みをいただきました株式会社地域創生ホールディングスの${agent}と申します。
最終確認の御連絡いたしました。留守番電話を聞きましたらこちらのフリーダイヤル宛に折り返しご連絡をお願いいたします。`;
        }
        return `わたくし、株式会社地域創生ホールディングスの${agent}と申します。先日お申込み頂きました、電気契約について最終確認のお電話を致しました。お電話口はご担当者様（代表者様）${customer}でいらっしゃいますでしょうか。（有難う御座います！）
お電話口が代表者じゃない場合→先日お申込みいただきました${customer}へお取次ぎいただけますでしょうか？
この度は、「じもとつながるプラン」をお申込みいただき誠に有難う御座います。
最終確認のお電話でございますので、只今お時間４～５分程よろしいでしょうか？(有難う御座います！)
尚、弊社の品質向上のためにお電話の内容を録音させていただいておりますのでご了承下さい。⇒必ずお伝え下さい。
↑明るくはっきり
※ご本人、または配偶者以外の場合はNG、但し契約者本人の代理、かつ実申込者の場合は本人許諾があることを確認の上、コールを進めて問題ないが、間柄とフルネームをヒアリングし備考に記載する※`;
      }

      if (type === 'inbound') {
        return `お電話ありがとうございます。わたくし、株式会社地域創生ホールディングスの${agent}と申します。
お客様情報の確認をいたしますので、お客様の電話番号をお願いいたします。内容確認をいたしますので、少々お待ちくださいませ。確認が取れましたので、続きましては、屋号名とご代表者様のお名前をよろしくお願いいたします。
続きまして、ご契約者様の生年月日を西暦でお伺いしてもよろしいでしょうか。（有難う御座います！）
確認が取れました。ご協力ありがとうございました。

ご代表者様以外の場合→申込番号や、屋号名、お名前を伺い、ご代表様に代わって頂く。→＜オープニングトーク/パーミッション＞に戻る。

営業マンの場合（最後）→注意事項などないでしょうか。`;
      }
      if (type === 'voicemail') {
        return `わたくし、先日「〇〇でんき・〇〇ガス」のお申込みをいただきました株式会社地域創生ホールディングスの${agent}と申します。
最終確認の御連絡いたしました。留守番電話を聞きましたらこちらのフリーダイヤル宛に折り返しご連絡をお願いいたします。`;
      }
      return `わたくし、株式会社地域創生ホールディングスの${agent}と申します。先日お申込み頂きました、電気契約について最終確認のお電話を致しました。お電話口はご担当者様（代表者様）${customer}でいらっしゃいますでしょうか。（有難う御座います！）
お電話口が代表者じゃない場合→先日お申込みいただきました${customer}へお取次ぎいただけますでしょうか？
この度は、お申込みいただき誠に有難う御座います。
最終確認のお電話でございますので、只今お時間４～５分程よろしいでしょうか？(有難う御座います！)
尚、弊社の品質向上のためにお電話の内容を録音させていただいておりますのでご了承下さい。⇒必ずお伝え下さい。
↑明るくはっきり
※代表者・担当者以外の場合はNG ・私が担当と仰せの場合はコールを進めて問題ないが、間柄とフルネームをヒアリングし備考に記載する※`;
    }

    function introScript() {
      const respot = v('caseType') === 'respot';
      if (currentPlan === 'jimoto') {
        return `①まず初めに、恐れ入りますが、確認のため、ご契約者様のお名前をフルネームでお伺いしてもよろしいでしょうか。
②続きまして、ご契約者様の生年月日を西暦でお伺いしてもよろしいでしょうか。
18歳以上89歳以下を確認
※お電話口が冒頭で確認した契約者以外（配偶者、また代理人）の場合は、改めてご本人様との間柄とフルネーム、連絡先をヒアリングしておきましょう。
登録と相違→NG
（有難う御座います！）`;
      }
      const base = `まず初めに、今回お申し込み頂いているプランは、事業を営んでいる法人様向け電力でございます。
事業者専用のお申し込みになり、個人もしくは、廃業しているお客様はお申し込みいただけませんが問題ないでしょうか。 また、確認のため代表者様の生年月日を西暦で確認させていただいております。お伺いしてもよろしいでしょうか。
知らない→口頭開示し確認認識ないようであればNG
登録と相違→NG
（有難う御座います！）`;
      return respot ? `【再点案件の場合】
${base}` : base;
    }

    function intentScript() {
      const plan = textOr(v('planName'), currentPlan === 'jimoto' ? 'じもとつながるプラン' : '○○でんき・○○ガス');
      if (currentPlan === 'jimoto') {
        return `先日WEBフォームよりご入力いただきました内容で、${plan}への提供元変更の手続きを進めさせていただきますが宜しいでしょうか？(有難う御座います！)`;
      }

      const p = v('paymentType');
      if (p === 'bank') return `今回口座振替でお申し込みいただいておりますが、記載情報に不備なく、スムーズに進んだ場合でも１〜2ヶ月お時間が掛かるケースがございます。登録が完了するまでの間はコンビニ払いの請求書をお送り致しますので、請求書でのお支払いをお願いいたします。`;
      if (p === 'credit') return `クレジットカードの情報のご記載をしていただく書面をお送りいたします。書面が届いたらご記入いただき、ご返送の程よろしくお願いいたします。登録が完了するまでの間はコンビニ払いの請求書をお送り致しますので、請求書でのお支払いをお願いいたします。`;
      return `今回コンビニ支払いでお申込みいただいておりますが、請求書が毎月20日頃に届きまして、一枚550円の発行手数料がかかります。請求書が届きましたら、お近くのコンビニでお支払いをお願いいたします。`;
    }

    function myPageScript() {
      if (currentPlan === 'jimoto') {
        return `また、地域創生でんきのHP上に、月々の請求金額の内訳、使用量をご確認できるお客様専用のマイページを設けており、お申し込み完了後、ご利用方法を記載した書類をIDと一緒にお送りいたしますのでお手元に届きましたら大切に保管をお願いします。切り替えがスムーズに進んだ場合、初回の請求月は、最短で3か月後になります。
毎月23日前後にマイページへ請求情報が更新されますのでご確認の際はパソコン、スマホからご覧ください。
※処理時の注意※`;
      }
      return `また、HP上に、月々の請求金額の内訳、使用量をご確認できるお客様専用のマイページを設けており、お申し込み完了後、ご利用方法を記載した書類をIDと一緒にお送りいたしますのでお手元に届きましたら大切に保管をお願いします。切り替えがスムーズに進んだ場合、初回の請求月は、最短で3か月後になります。
毎月23日前後にマイページへ請求情報が更新されますのでご確認の際はパソコン、スマホからご覧ください。
＜確認事項(契約確認コール時)最終チェック項目＞
・再点・新設・追加・簡易テレマ・併売
・重要事項明書等 SMS`;
    }

    function finalConfirmScript() {
      if (currentPlan !== 'jimoto') return '';
      return `それでは、本日確認させていただいた内容にて、じもとつながるプランのご契約を進めさせていただいてもよろしいでしょうか？（有難う御座います！）`;
    }

    function closingScript() {
      const agent = textOr(v('agentName'), '○○');
      const last4 = textOr(v('phoneLast4'), '○○○○');
      const gasTalk = ['tokyo', 'osaka', 'nagoya'].includes(v('regionType')) && checked('gasIncluded')
        ? `【ガストーク】※東京、大阪、名古屋のみトーク展開（※都市ガスのみ）
今後追加で電気やガスの契約がございましたらセット割引も可能ですので、お気軽にご連絡ください。

`
        : '';
      return `${gasTalk}確認は以上でございますが、何かご不明点などはございますか？（有難う御座います！）
${currentPlan === 'jimoto' ? '失礼致します。' : ''}
今後、お問い合わせをご希望の場合は後日お送りさせていただきます、書面にも御記載があります、
弊社カスタマーセンターまでどうぞお気軽にお電話ください。
最後に、折り返しさせていただく場合のお電話番号はこちらの、下4ケタ${last4}で終わるお電話番号でよろしいでしょうか。
本日は貴重なお時間をいただきありがとうございました。本日のお手続きは${agent}が承りました。
今後ともよろしくお願いいたします。失礼致します。

＜質問された場合＞
地域創生ホールディングスカスタマーセンターの電話番号は、後日お送りいたします書面にも記載されているのですが、今口頭でお伝えしてもよろしいでしょうか。（有り難う御座います！）
地域創生ホールディングスカスタマーセンターのお電話番号は「0570-099-959」でございます。
窓口時間は、平日の午前10時から18時までとなっており、日曜、祝日、年末年始はお休みをいただいております。`;
    }

    function ngScript() {
      const type = v('ngType');
      if (type === 'none') return '';
      if (currentPlan === 'jimoto') {
        if (type === 'cancel_common') {
          return `お客様：キャンセル希望(○○聞いてなかった〜.○○だったらキャンセルする)
キャンセルの希望の場合
畏まりました。そうしましたら私、○○にてこのお電話でキャンセルを受け付けさせていただきます。なお、契約前の為、費用は発生しませんので、ご安心ください。
キャンセルにつきまして、営業担当からのご連絡等は必要でございますか？
ーはい
かしこまりました。後ほど営業担当からご連絡致しますのでお待ちください。
ーいいえ
かしこまりました。わたくしの方でキャンセルを承ります。
（キャンセルした旨の書類は送ることができるが、聞かれた場合だけで良い）

リードタイム：N＋1日 or 2日（土日を除く）
※リードタイムは聞かれた場合のみ案内して下さい。`;
        }
        return '';
      }
      if (type === 'elderly') {
        return `お客様：キャンセル希望(○○聞いてなかった〜.○○だったらキャンセルする)
高齢者の場合
畏まりました。そうしましたら私、○○にてこのお電話で○○でんきのキャンセルを受け付けさせていただきます。なお、契約前の為、費用は発生しませんので、ご安心ください。`;
      }
      if (type === 'non_elderly') {
        return `お客様：キャンセル希望(○○聞いてなかった〜.○○だったらキャンセルする)
高齢者以外の場合
畏まりました。そうしましたら私、○○にてこのお電話で○○でんきのキャンセルを受け付けさせていただきます。キャンセルにつきまして、営業担当からのご連絡等は必要でございますか？
ーはい
かしこまりました。後ほど営業担当からご連絡致しますのでお待ちください。
ーいいえ
かしこまりました。わたくしの方でキャンセルを承ります。
（キャンセルした旨の書類は送ることができるが、聞かれた場合だけで良い）
リードタイム：N＋1日 or 2日（土日を除く）
※リードタイムは聞かれた場合のみ案内して下さい。
※折り返し不承の場合は、そのままキャンセルを承り、備考欄へ記載+NG共有メールにその旨を記載し共有をお願い致します。`;
      }
      if (type === 'respot_long_absence') {
        return `再点案件の場合
※顧客区分「ご入居」
長期留守NGの時の対応：依頼管理作成→キャンセル書面発送「備考：再点」
（判別不可となるため、依頼管理の備考は「再点以外入力は行わないでください）`;
      }
      return '';
    }

    function renderScript() {
      const sections = [];
      sections.push(makeSection('オープニングトーク / パーミッション', commonOpening(), '必須'));
      sections.push(makeSection('冒頭説明', introScript(), '必須'));
      sections.push(makeSection('申し込み意思確認', intentScript(), '必須'));
      sections.push(makeSection('契約書控え・約款・重要事項説明書の確認', docsScript(), '必須'));
      sections.push(makeSection(currentPlan === 'jimoto' ? '要点確認' : 'みらいプランの要点説明', planCoreScript(), '必須'));
      if (currentPlan === 'mirai') sections.push(makeSection('OPについての場合分け', optionScript(), '分岐'));
      if (currentPlan === 'mirai') sections.push(makeSection('店舗数・オーナー了承確認 / 契約数確認', ownerScript(), '必須'));
      sections.push(makeSection(currentPlan === 'jimoto' ? 'サービス提供会社名変更・電力提供会社変更' : 'サービス提供会社名変更・電力提供会社変更', providerScript(), '必須'));
      if (currentPlan === 'mirai') sections.push(makeSection('安定供給維持費 / 支払繰延規定', stableSupplyScript(), '必須'));
      if (currentPlan === 'mirai') sections.push(makeSection('契約期間・違約金について', penaltyScript(), '必須'));
      sections.push(makeSection('切り替え・請求タイミング', switchTimingScript(), '必須'));
      sections.push(makeSection('支払方法について', paymentScript(), '必須'));
      sections.push(makeSection('マイページ説明', myPageScript(), '必須'));
      if (currentPlan === 'jimoto') sections.push(makeSection('最終確認', finalConfirmScript(), '必須'));
      sections.push(makeSection('クローズトーク', closingScript(), '必須'));
      const ng = ngScript();
      if (ng) sections.push(makeSection('契約確認コールNGについて', ng, 'NG分岐'));
      document.getElementById('sections').innerHTML = sections.join('');
    }

    function copyAllText() {
      const temp = document.createElement('div');
      temp.innerHTML = document.getElementById('sections').innerHTML;
      navigator.clipboard.writeText(temp.innerText).then(() => alert('表示中の全文をコピーしました。'));
    }

    function resetForm() {
      document.querySelectorAll('input[type="text"], input[type="number"], textarea').forEach(el => el.value = '');
      document.querySelectorAll('input[type="checkbox"]').forEach(el => el.checked = false);
      document.querySelectorAll('select').forEach(el => el.selectedIndex = 0);
      document.getElementById('contractYears').value = '5';
      currentPlan = 'jimoto';
      switchPlan('jimoto');
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderScript();
    });
  </script>
